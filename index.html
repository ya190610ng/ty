<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GB 7718-2025 保质期到期日计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .calculator-container {
            width: 600px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #e4e7ed;
        }

        .calc-title {
            font-size: 18px;
            font-weight: bold;
            color: #303133;
        }

        .dark-mode-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background-color: #409eff;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-mode-btn:hover {
            background-color: #337ecc;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e4e7ed;
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            border: none;
            background: #f8f9fa;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            color: #606266;
        }

        .tab-btn.active {
            background: #409eff;
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #e8f3ff;
        }

        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #303133;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        .form-input:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.1);
        }

        .result-input {
            background-color: #f5f7fa;
            cursor: not-allowed;
            color: #f56c6c;
            font-weight: bold;
        }

        .tips {
            font-size: 12px;
            color: #909399;
            margin-top: 6px;
            line-height: 1.5;
        }

        .dark-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 9999;
            padding: 20px;
            cursor: default;
        }

        .dark-mode.active {
            display: flex;
        }

        .dark-product {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
            color: #409eff;
        }

        .dark-info {
            font-size: 40px;
            margin: 15px 0;
            text-align: center;
            line-height: 1.5;
        }

        .dark-close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 12px 24px;
            font-size: 18px;
            background-color: #f56c6c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            opacity: 1;
        }

        .dark-close-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="dark-mode" id="darkMode">
        <button class="dark-close-btn" id="closeDarkBtn">开灯</button>
        <div class="dark-product" id="darkProduct">生产品相</div>
        <div class="dark-info">生产日期：<span id="darkDate"></span></div>
        <div class="dark-info">到期日：<span id="darkExpire"></span></div>
    </div>

    <div class="calculator-container">
        <div class="calc-header">
            <div class="calc-title">GB 7718-2025 保质期到期日计算器</div>
            <button class="dark-mode-btn" id="darkBtn">关灯</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="month">按月计算</button>
            <button class="tab-btn" data-tab="day">按天计算</button>
        </div>

        <div class="tab-content active" id="month">
            <div class="form-group">
                <label class="form-label">生产品相</label>
                <input type="text" class="form-input" id="month-product" placeholder="请输入生产品相">
            </div>

            <div class="form-group">
                <label class="form-label">生产日期</label>
                <input type="date" class="form-input" id="month-produce-date">
                <div class="tips">1、以年月日表示，格式：YYYY-MM-DD；2、默认自动同步电脑系统日期；3、手动修改后停止自动同步，清空可恢复</div>
            </div>

            <div class="form-group">
                <label class="form-label">保质期（月）</label>
                <input type="number" class="form-input" id="month-value" min="1" placeholder="请填写阿拉伯数字">
                <div class="tips">填写阿拉伯数字，填写错误显示 #VALUE！</div>
            </div>

            <div class="form-group">
                <label class="form-label">保质期到期日</label>
                <input type="text" class="form-input result-input" id="month-result" readonly placeholder="#VALUE！">
                <div class="tips">1、保质期以生产日期当天为计算起点；2、遵循《民法典》第十章第二百零二条；3、不可修改</div>
            </div>
        </div>

        <div class="tab-content" id="day">
            <div class="form-group">
                <label class="form-label">生产品相</label>
                <input type="text" class="form-input" id="day-product" placeholder="请输入生产品相">
            </div>

            <div class="form-group">
                <label class="form-label">生产日期</label>
                <input type="date" class="form-input" id="day-produce-date">
                <div class="tips">1、以年月日表示，格式：YYYY-MM-DD；2、默认自动同步电脑系统日期；3、手动修改后停止自动同步，清空可恢复</div>
            </div>

            <div class="form-group">
                <label class="form-label">保质期（天）</label>
                <input type="number" class="form-input" id="day-value" min="1" placeholder="请填写阿拉伯数字">
                <div class="tips">填写阿拉伯数字，填写错误显示 #VALUE！</div>
            </div>

            <div class="form-group">
                <label class="form-label">保质期到期日</label>
                <input type="text" class="form-input result-input" id="day-result" readonly placeholder="#VALUE！">
                <div class="tips">1、保质期以生产日期当天为计算起点；2、遵循《民法典》第十章第二百零二条；3、不可修改</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM元素
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            const darkBtn = document.getElementById('darkBtn');
            const darkMode = document.getElementById('darkMode');
            const closeDarkBtn = document.getElementById('closeDarkBtn');
            const darkProduct = document.getElementById('darkProduct');
            const darkDate = document.getElementById('darkDate');
            const darkExpire = document.getElementById('darkExpire');

            const monthProduceDate = document.getElementById('month-produce-date');
            const monthValue = document.getElementById('month-value');
            const monthResult = document.getElementById('month-result');
            const monthProduct = document.getElementById('month-product');

            const dayProduceDate = document.getElementById('day-produce-date');
            const dayValue = document.getElementById('day-value');
            const dayResult = document.getElementById('day-result');
            const dayProduct = document.getElementById('day-product');

            let lastAutoSetDate = '';
            let currentDarkTab = 'month';

            // 关灯模式下鼠标无动作计时器
            let darkMouseTimer = null;
            const HIDE_DELAY = 3000;

            // 日期格式化
            function formatDate(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return year + '-' + month + '-' + day;
            }

            function getTodayStr() {
                return formatDate(new Date());
            }

            // 重置关灯模式下的鼠标计时器
            function resetDarkMouseTimer() {
                closeDarkBtn.classList.remove('hidden');
                if (darkMouseTimer) {
                    clearTimeout(darkMouseTimer);
                    darkMouseTimer = null;
                }
                if (darkMode.classList.contains('active')) {
                    darkMouseTimer = setTimeout(() => {
                        closeDarkBtn.classList.add('hidden');
                    }, HIDE_DELAY);
                }
            }

            function clearDarkMouseTimer() {
                if (darkMouseTimer) {
                    clearTimeout(darkMouseTimer);
                    darkMouseTimer = null;
                }
                closeDarkBtn.classList.remove('hidden');
            }

            // 自动同步系统日期
            function syncSystemDate() {
                const todayStr = getTodayStr();
                let anyFieldUpdated = false;

                if (document.activeElement !== monthProduceDate) {
                    if (monthProduceDate.value === lastAutoSetDate || monthProduceDate.value === '') {
                        if (monthProduceDate.value !== todayStr) {
                            monthProduceDate.value = todayStr;
                            anyFieldUpdated = true;
                            calculateMonth();
                        }
                    }
                }

                if (document.activeElement !== dayProduceDate) {
                    if (dayProduceDate.value === lastAutoSetDate || dayProduceDate.value === '') {
                        if (dayProduceDate.value !== todayStr) {
                            dayProduceDate.value = todayStr;
                            anyFieldUpdated = true;
                            calculateDay();
                        }
                    }
                }

                if (anyFieldUpdated) {
                    lastAutoSetDate = todayStr;
                }

                updateDarkDisplay();
            }

            function updateDarkDisplay() {
                if (!darkMode.classList.contains('active')) return;

                let product, date, expire;
                if (currentDarkTab === 'month') {
                    product = monthProduct.value || '未填写品相';
                    date = monthProduceDate.value || '未填写';
                    expire = monthResult.value || '#VALUE！';
                } else {
                    product = dayProduct.value || '未填写品相';
                    date = dayProduceDate.value || '未填写';
                    expire = dayResult.value || '#VALUE！';
                }

                darkProduct.textContent = product;
                darkDate.textContent = date;
                darkExpire.textContent = expire;
            }

            // ================= 按月计算（修正版） =================
            function calculateMonth() {
                const produceDateStr = monthProduceDate.value;
                const monthVal = parseInt(monthValue.value);
                if (!produceDateStr || isNaN(monthVal) || monthVal < 1) {
                    monthResult.value = '#VALUE！';
                    return;
                }
                const produceDate = new Date(produceDateStr + 'T00:00:00');
                if (isNaN(produceDate.getTime())) {
                    monthResult.value = '#VALUE！';
                    return;
                }

                let year = produceDate.getFullYear();
                let month = produceDate.getMonth();     // 0-11
                let day = produceDate.getDate();

                // 1. 加月份，计算目标年份和月份
                let totalMonths = month + monthVal;
                let targetYear = year + Math.floor(totalMonths / 12);
                let targetMonth = totalMonths % 12;

                // 2. 获取目标月份的实际天数（考虑平年/闰年）
                let lastDayOfTargetMonth = new Date(targetYear, targetMonth + 1, 0).getDate();

                let expireDate;
                if (day <= lastDayOfTargetMonth) {
                    // 对应日存在：使用该日，然后减 1 天
                    expireDate = new Date(targetYear, targetMonth, day);
                    expireDate.setDate(expireDate.getDate() - 1);
                } else {
                    // 对应日不存在：直接使用目标月份的最后一天，不再减 1 天
                    expireDate = new Date(targetYear, targetMonth, lastDayOfTargetMonth);
                }

                monthResult.value = formatDate(expireDate);
            }

            // 按天计算（无需修改）
            function calculateDay() {
                const produceDate = dayProduceDate.value;
                const dayVal = parseInt(dayValue.value);
                if (!produceDate || isNaN(dayVal) || dayVal < 1) {
                    dayResult.value = '#VALUE！';
                    return;
                }
                const date = new Date(produceDate + 'T00:00:00');
                if (isNaN(date.getTime())) {
                    dayResult.value = '#VALUE！';
                    return;
                }
                // 等效于加上 (dayVal-1) 天
                date.setDate(date.getDate() + dayVal - 1);
                dayResult.value = formatDate(date);
            }

            // 标签切换
            tabBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.getAttribute('data-tab')).classList.add('active');
                });
            });

            // 关灯
            function showDarkMode() {
                const activeTab = document.querySelector('.tab-content.active');
                currentDarkTab = activeTab.id;
                updateDarkDisplay();
                darkMode.classList.add('active');
                resetDarkMouseTimer();
            }

            function hideDarkMode() {
                darkMode.classList.remove('active');
                clearDarkMouseTimer();
            }

            darkMode.addEventListener('mousemove', function() {
                if (!darkMode.classList.contains('active')) return;
                resetDarkMouseTimer();
            });
            darkMode.addEventListener('touchmove', function() {
                if (!darkMode.classList.contains('active')) return;
                resetDarkMouseTimer();
            }, { passive: true });

            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    syncSystemDate();
                }
            });

            window.addEventListener('focus', function() {
                syncSystemDate();
            });

            // 初始化
            function init() {
                const todayStr = getTodayStr();
                monthProduceDate.value = todayStr;
                dayProduceDate.value = todayStr;
                lastAutoSetDate = todayStr;

                calculateMonth();
                calculateDay();

                setInterval(syncSystemDate, 500);

                monthValue.addEventListener('input', calculateMonth);
                dayValue.addEventListener('input', calculateDay);
                monthProduceDate.addEventListener('input', calculateMonth);
                dayProduceDate.addEventListener('input', calculateDay);

                darkBtn.addEventListener('click', showDarkMode);
                closeDarkBtn.addEventListener('click', hideDarkMode);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
